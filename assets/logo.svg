<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#123A6B"/>
      <stop offset="100%" stop-color="#050F20"/>
    </linearGradient>
    <radialGradient id="globe" cx="34%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#6AA6FF"/>
      <stop offset="45%" stop-color="#1D5FD1"/>
      <stop offset="100%" stop-color="#0A2C63"/>
    </radialGradient>
    <radialGradient id="shine" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <clipPath id="globeClip">
      <circle cx="248" cy="256" r="152"/>
    </clipPath>
  </defs>

  <rect width="512" height="512" rx="104" fill="url(#bg)"/>

  <!-- wireframe globe -->
  <g filter="url(#softShadow)">
    <circle cx="248" cy="256" r="152" fill="url(#globe)"/>
    <g clip-path="url(#globeClip)" stroke="#DCEBFF" stroke-opacity="0.55" fill="none">
      <!-- parallels (latitude) -->
      <line x1="96" y1="256" x2="400" y2="256" stroke-width="6"/>
      <line x1="96" y1="197" x2="400" y2="197" stroke-width="5"/>
      <line x1="96" y1="315" x2="400" y2="315" stroke-width="5"/>
      <line x1="96" y1="140" x2="400" y2="140" stroke-width="4"/>
      <line x1="96" y1="372" x2="400" y2="372" stroke-width="4"/>
      <!-- meridians (longitude) -->
      <ellipse cx="248" cy="256" rx="60" ry="152" stroke-width="6"/>
      <ellipse cx="248" cy="256" rx="112" ry="152" stroke-width="6"/>
      <line x1="248" y1="104" x2="248" y2="408" stroke-width="6"/>
    </g>
    <circle cx="248" cy="256" r="152" fill="none" stroke="#081B38" stroke-width="10"/>
    <ellipse cx="200" cy="196" rx="66" ry="46" fill="url(#shine)"/>
  </g>

  <!-- spreadsheet badge, cut into the globe's lower-right edge -->
  <g filter="url(#softShadow)">
    <rect x="286" y="294" width="150" height="150" rx="26" fill="#F5F7FA" stroke="#081B38" stroke-width="6"/>
    <g stroke="#93A1B8" stroke-width="4">
      <path d="M286 344 H436"/>
      <path d="M286 394 H436"/>
      <path d="M336 294 V444"/>
      <path d="M386 294 V444"/>
    </g>
    <!-- active cell highlight -->
    <rect x="336" y="344" width="50" height="50" fill="#F2A900" opacity="0.95"/>
  </g>
</svg>
