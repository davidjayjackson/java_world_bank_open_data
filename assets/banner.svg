<svg width="1200" height="300" viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#123A6B"/>
      <stop offset="100%" stop-color="#050F20"/>
    </linearGradient>
    <radialGradient id="globe" cx="34%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#6AA6FF"/>
      <stop offset="45%" stop-color="#1D5FD1"/>
      <stop offset="100%" stop-color="#0A2C63"/>
    </radialGradient>
    <radialGradient id="shine" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <clipPath id="globeClip">
      <circle cx="248" cy="256" r="152"/>
    </clipPath>
    <pattern id="gridPattern" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0 H0 V40" fill="none" stroke="#FFFFFF" stroke-width="1" opacity="0.05"/>
    </pattern>
  </defs>

  <rect width="1200" height="300" fill="url(#bg)"/>
  <rect width="1200" height="300" fill="url(#gridPattern)"/>

  <!-- wireframe globe + spreadsheet badge, scaled down -->
  <g transform="translate(60,54) scale(0.62)">
    <g filter="url(#softShadow)">
      <circle cx="248" cy="256" r="152" fill="url(#globe)"/>
      <g clip-path="url(#globeClip)" stroke="#DCEBFF" stroke-opacity="0.55" fill="none">
        <line x1="96" y1="256" x2="400" y2="256" stroke-width="6"/>
        <line x1="96" y1="197" x2="400" y2="197" stroke-width="5"/>
        <line x1="96" y1="315" x2="400" y2="315" stroke-width="5"/>
        <line x1="96" y1="140" x2="400" y2="140" stroke-width="4"/>
        <line x1="96" y1="372" x2="400" y2="372" stroke-width="4"/>
        <ellipse cx="248" cy="256" rx="60" ry="152" stroke-width="6"/>
        <ellipse cx="248" cy="256" rx="112" ry="152" stroke-width="6"/>
        <line x1="248" y1="104" x2="248" y2="408" stroke-width="6"/>
      </g>
      <circle cx="248" cy="256" r="152" fill="none" stroke="#081B38" stroke-width="10"/>
      <ellipse cx="200" cy="196" rx="66" ry="46" fill="url(#shine)"/>
    </g>
    <g filter="url(#softShadow)">
      <rect x="286" y="294" width="150" height="150" rx="26" fill="#F5F7FA" stroke="#081B38" stroke-width="6"/>
      <g stroke="#93A1B8" stroke-width="4">
        <path d="M286 344 H436"/>
        <path d="M286 394 H436"/>
        <path d="M336 294 V444"/>
        <path d="M386 294 V444"/>
      </g>
      <rect x="336" y="344" width="50" height="50" fill="#F2A900" opacity="0.95"/>
    </g>
  </g>

  <!-- title block -->
  <g font-family="Liberation Sans, Arial, sans-serif">
    <text x="330" y="112" font-size="42" font-weight="700" fill="#F5F7FA">World Bank Open Data Calc Add-In</text>
    <text x="332" y="148" font-size="20" fill="#A9B4C7">GDP, population &amp; 1,000+ indicators as LibreOffice Calc formulas</text>
  </g>

  <!-- formula chips -->
  <g font-family="Liberation Mono, DejaVu Sans Mono, monospace" font-size="17">
    <g>
      <rect x="332" y="182" width="150" height="40" rx="20" fill="none" stroke="#F2A900" stroke-width="1.5" opacity="0.85"/>
      <text x="352" y="208" fill="#FFE7A8">WBVALUE()</text>
    </g>
    <g>
      <rect x="498" y="182" width="165" height="40" rx="20" fill="none" stroke="#F2A900" stroke-width="1.5" opacity="0.85"/>
      <text x="518" y="208" fill="#FFE7A8">WBSERIES()</text>
    </g>
    <g>
      <rect x="679" y="182" width="165" height="40" rx="20" fill="none" stroke="#F2A900" stroke-width="1.5" opacity="0.85"/>
      <text x="699" y="208" fill="#FFE7A8">WBLATEST()</text>
    </g>
    <g>
      <rect x="860" y="182" width="140" height="40" rx="20" fill="none" stroke="#F2A900" stroke-width="1.5" opacity="0.85"/>
      <text x="880" y="208" fill="#FFE7A8">WBMETA()</text>
    </g>
  </g>

  <text x="332" y="252" font-family="Liberation Sans, Arial, sans-serif" font-size="15" fill="#6E7A90">Java 8 &#183; zero dependencies &#183; MIT licensed &#183; no API key needed</text>
</svg>
